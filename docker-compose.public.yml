version: '3.8'

services:
  # Public API service. Neo4j is NOT started here.
  # API reaches Neo4j over a private company network (VPN/private link).
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api-public
    ports:
      - "5001:5001"
    environment:
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-rag-semantic-inference}
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  default:
    name: rag-public-network
